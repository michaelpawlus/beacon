# Curated seed feed for `beacon companies discover --source yaml`.
#
# This file is the always-available fallback when Crunchbase auth isn't set,
# and the home for "saw this on HN, look later" candidates.
#
# Schema: see beacon/sources/yaml_curated.py docstring.
# - `name` is required.
# - `source_ref` defaults to a slug of `name`; set it explicitly when you might
#   later rename the entry but want to keep its history.
# - `signals` are optional; each one bumps the discovery score so well-evidenced
#   candidates surface at the top of `beacon companies candidates`.

companies:
